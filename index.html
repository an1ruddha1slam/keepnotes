<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Google Keep 240x320</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: #f0f0f0;
    }

    .iframe-container {
      width: 240px;   /* fixed width */
      height: 320px;  /* fixed height */
      border: 2px solid #ccc;
      border-radius: 8px;
      overflow: hidden;
    }

    .iframe-container iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <div class="iframe-container">
    <iframe src="https://keep.google.com" allowfullscreen></iframe>
  </div>
</body>
</html>
