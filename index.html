<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=240, height=320, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .phone-frame {
      width: 240px;
      height: 320px;
      border: 2px solid #ccc;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(255,255,255,0.3);
    }
    .phone-frame iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <div class="phone-frame">
    <iframe src="https://keep.google.com"></iframe>
  </div>
</body>
</html>
